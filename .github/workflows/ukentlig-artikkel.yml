name: Ukentlig Forsikringsartikkel

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  generer-artikkel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generer artikkel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generer-artikkel.js
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Ny artikkel $(date +'%Y-%m-%d')"
          git push
