name: Ukentlig Forsikringsartikkel

on:
  schedule:
    - cron: '0 7 * * 1'  # Hver mandag kl 07:00
  workflow_dispatch:

jobs:
  generer-artikkel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer avhengigheter
        run: |
          npm install --prefix scripts

      - name: Generer ny artikkel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/generer-artikkel.js

      - name: Commit og push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Ny forsikringsartikkel $(date +'%Y-%m-%d')"
          git push
